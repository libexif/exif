name: "CodeQL"

on:
  push:
    branches:
      - master
      - '*/ci'
  pull_request:
    branches:
      - master
      - '*/ci'
  schedule:
    - cron: "40 0 * * 6"

permissions: {}

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    env:
      MAKEFLAGS: -j 5
      DEBIAN_FRONTEND: noninteractive

    strategy:
      fail-fast: false
      matrix:
        language: [ cpp ]

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.0

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          queries: +security-and-quality
      # install automake and friends
      - run: sudo apt-get update && sudo apt-get install -y autopoint automake autoconf libtool libpopt-dev
      # get and build the latest libexif first
      - run: |
          git clone --depth=1 https://github.com/libexif/libexif.git /tmp/libexif
          cd /tmp/libexif
          autoreconf -i -f
          ./configure --prefix="$PWD"/install
          make
          make check
          make install

      # build and check
      - run: autoreconf -i -f && PKG_CONFIG_PATH="$PKG_CONFIG_PATH:/tmp/libexif/install/lib/pkgconfig" ./configure && make && make check

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{ matrix.language }}"
